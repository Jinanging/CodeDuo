services:
  mysql:
    image: mysql:8.4
    container_name: codeduo-mysql
    environment:
      MYSQL_DATABASE: codeduo
      MYSQL_USER: codeduo
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in a local .env file}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in a local .env file}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3306}:3306"
    volumes:
      - codeduo-mysql:/var/lib/mysql

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeduo-backend
    depends_on:
      - mysql
    environment:
      DB_URL: jdbc:mysql://mysql:3306/codeduo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_USERNAME: codeduo
      DB_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in a local .env file}
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      JWT_SECRET: ${JWT_SECRET:?Set a random JWT_SECRET of at least 32 bytes in a local .env file}
      GRADING_SECRETS_PATH: /run/secrets/codeduo-grading.json
      GRADING_REQUIRE_SECRETS: "true"
      JUDGE0_BASE_URL: ${JUDGE0_BASE_URL:-http://host.docker.internal:2358}
      JUDGE0_MOCK: ${JUDGE0_MOCK:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    volumes:
      - ${GRADING_SECRETS_FILE:?Set the absolute path to grading-secrets.json}:/run/secrets/codeduo-grading.json:ro
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"

  # judge0:
  #   image: judge0/judge0:latest
  #   ports:
  #     - "2358:2358"

volumes:
  codeduo-mysql:
