# H2 인메모리 프로파일: MySQL/도커 없이 백엔드만 실행할 때 사용.
# 실행: bootRun 시 활성 프로파일을 h2 로. (IntelliJ 실행설정 Active profiles = h2,
#       또는 VM 옵션 -Dspring.profiles.active=h2)
# 데이터는 서버 재시작 시 초기화됨(시드 계정/문제는 매번 재생성).
spring:
  datasource:
    url: jdbc:h2:mem:codeduo;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
