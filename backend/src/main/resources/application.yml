server:
  port: 8080

spring:
  application:
    name: codeduo-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/codeduo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:codeduo}
    password: ${DB_PASSWORD:codeduo}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true

jwt:
  secret: ${JWT_SECRET:codeduo-local-secret-key-for-mvp-change-before-production-please}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

judge0:
  base-url: ${JUDGE0_BASE_URL:http://localhost:2358}
  python-language-id: ${JUDGE0_PYTHON_LANGUAGE_ID:71}
  mock: ${JUDGE0_MOCK:true}
  # RapidAPI 사용 시 키 입력(셀프호스팅이면 비워둠)
  rapidapi-key: ${JUDGE0_RAPIDAPI_KEY:}
  rapidapi-host: ${JUDGE0_RAPIDAPI_HOST:judge0-ce.p.rapidapi.com}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
