server:
  port: 8080

spring:
  application:
    name: codeduo-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/codeduo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${DB_USERNAME:codeduo}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

grading:
  secrets-path: ${GRADING_SECRETS_PATH:}
  require-secrets: ${GRADING_REQUIRE_SECRETS:false}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  auth-rate-limit:
    max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
    window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

judge0:
  base-url: ${JUDGE0_BASE_URL:http://localhost:2358}
  python-language-id: ${JUDGE0_PYTHON_LANGUAGE_ID:71}
  mock: ${JUDGE0_MOCK:true}
  # RapidAPI 사용 시 키 입력(셀프호스팅이면 비워둠)
  rapidapi-key: ${JUDGE0_RAPIDAPI_KEY:}
  rapidapi-host: ${JUDGE0_RAPIDAPI_HOST:judge0-ce.p.rapidapi.com}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:false}
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:false}
    path: /swagger-ui/index.html
